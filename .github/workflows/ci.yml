name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy app

      - name: Run Bandit (SAST)
        run: uv run bandit -r app/ -c pyproject.toml

      - name: Run pytest
        run: uv run pytest

      - name: Build Docker image
        run: docker build -t bankroll-risk-api:test .

      - name: Verify container runs as non-root
        run: |
          USER=$(docker run --rm bankroll-risk-api:test whoami)
          echo "Container runs as: $USER"
          if [ "$USER" = "root" ]; then
            echo "SECURITY ALERT: Container must not run as root!"
            exit 1
          fi

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'bankroll-risk-api:test'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Run container smoke test
        run: |
          docker run -d --rm -p 8000:8000 --name bankroll-api bankroll-risk-api:test

          echo "Waiting for API to start..."
          for i in {1..10}; do
            if curl -s -f http://127.0.0.1:8000/health > /dev/null; then
              echo "API is healthy and responding!"
              exit 0
            fi
            echo "Attempt $i failed. Retrying in 2 seconds..."
            sleep 2
          done

          echo "API failed to start within the timeout. Container logs:"
          docker logs bankroll-api
          exit 1
